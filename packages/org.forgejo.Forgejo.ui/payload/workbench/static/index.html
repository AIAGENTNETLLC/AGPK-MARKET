<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title">Forgejo Workbench · AgentOS</title>
  <style>
    :root {
      --bg: #1d1d1f;
      --panel: #2c2c2e;
      --text: #f5f5f7;
      --muted: #a1a1a6;
      --accent: #0071e3;
      --ok: #3df59a;
      --border: #3a3a3c;
      --danger: #ff453a;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 18px; border-bottom: 1px solid var(--border); background: #111;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .meta { color: var(--muted); font-size: 12px; flex: 1; }
    .lang-switch { display: flex; gap: 6px; align-items: center; }
    .lang-switch button {
      width: auto; margin: 0; padding: 4px 8px; font-size: 11px; background: #3a3a3c;
    }
    .lang-switch button.active { background: var(--accent); }
    main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 52px); }
    aside { border-right: 1px solid var(--border); padding: 16px; background: var(--panel); }
    section { padding: 16px 20px; }
    .status { font-size: 12px; line-height: 1.5; color: var(--muted); }
    .status strong { color: var(--ok); }
    .status.bad strong { color: var(--danger); }
    label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
    label.inline { display: flex; align-items: center; gap: 8px; }
    input, button, select {
      width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: #111; color: var(--text); font-size: 13px;
    }
    button {
      margin-top: 12px; background: var(--accent); border: none; cursor: pointer; font-weight: 600;
    }
    button.secondary { background: #3a3a3c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 500; }
    .err { color: var(--danger); font-size: 12px; margin-top: 8px; white-space: pre-wrap; }
    .ok { color: var(--ok); font-size: 12px; margin-top: 8px; }
    a { color: #64d2ff; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tabs button { width: auto; margin: 0; padding: 6px 12px; }
    iframe { width: 100%; height: calc(100vh - 120px); border: 1px solid var(--border); border-radius: 8px; background: #fff; }
    .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 999px; background: #3a3a3c; color: var(--muted); margin-left: 8px; }
  </style>
</head>
<body>
  <header>
    <h1><span data-i18n="brand">Forgejo Workbench</span> <span class="badge" data-i18n="badge">ui · depends core</span></h1>
    <div class="meta" id="hdr-meta" data-i18n="loading">loading…</div>
    <div class="lang-switch" title="Language / 语言">
      <button type="button" id="lang-zh" data-lang="zh">中文</button>
      <button type="button" id="lang-en" data-lang="en">EN</button>
    </div>
  </header>
  <main>
    <aside>
      <div class="status" id="core-status" data-i18n="checking_core">Checking core…</div>
      <h2 style="font-size:14px;margin:18px 0 0" data-i18n="create_repo">Create repository</h2>
      <label data-i18n="name">Name</label>
      <input id="repo-name" data-i18n-placeholder="name_ph" placeholder="my-repo" autocomplete="off" />
      <label data-i18n="description">Description</label>
      <input id="repo-desc" data-i18n-placeholder="desc_ph" placeholder="optional" />
      <label class="inline"><input type="checkbox" id="repo-private" checked style="width:auto" /> <span data-i18n="private">Private</span></label>
      <button id="btn-create" data-i18n="btn_create">Create via core API</button>
      <button class="secondary" id="btn-refresh" data-i18n="btn_refresh">Refresh list</button>
      <button class="secondary" id="btn-full" data-i18n="btn_full">Open full Forgejo (in-app)</button>
      <div id="msg"></div>
      <p class="status" style="margin-top:18px" data-i18n-html="footnote">
        Agent automation stays on <strong>core</strong> commands
        (<code>forgejo.repo.*</code>). This workbench is the human desktop face —
        not a second Forgejo process, not xdg-open system browser as primary path.
      </p>
    </aside>
    <section>
      <div class="tabs">
        <button id="tab-repos" class="secondary" data-i18n="tab_repos">Repositories</button>
        <button id="tab-embed" class="secondary" data-i18n="tab_embed">Full web (embedded)</button>
      </div>
      <div id="panel-repos">
        <table>
          <thead>
            <tr>
              <th data-i18n="col_name">Name</th>
              <th data-i18n="col_private">Private</th>
              <th data-i18n="col_updated">Updated</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="repo-body"><tr><td colspan="4" data-i18n="loading">Loading…</td></tr></tbody>
        </table>
        <div id="repo-detail" style="margin-top:16px"></div>
      </div>
      <div id="panel-embed" style="display:none">
        <iframe id="forge-frame" title="Forgejo" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-downloads"></iframe>
      </div>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
