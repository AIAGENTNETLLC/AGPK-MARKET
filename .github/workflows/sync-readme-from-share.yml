# Copy into AIAGENTNETLLC/AGPK-MARKET as:
#   .github/workflows/sync-readme-from-share.yml
#
# Regenerates Official packages + Other vendors tables from share live catalog
# after probe/revalidate (public GET only lists healthy|degraded).

name: sync-readme-from-share

on:
  schedule:
    # Every 6 hours UTC — share worker revalidates on its own tick; README is a projection.
    - cron: "17 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [agpk-catalog-changed]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync README from share catalog
        run: python3 scripts/sync_readme_from_share.py --readme README.md --write

      - name: Commit if changed
        run: |
          git config user.name "agpk-readme-bot"
          git config user.email "noreply@aiagentnet.cloud"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes"
            exit 0
          fi
          git commit -m "docs: auto-sync package tables from share catalog"
          git push origin HEAD
